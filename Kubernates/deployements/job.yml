kind: Job
apiVersion: batch/v1
metadata:
  name: test-job
spec:
  backoffLimit: 4
  completions: 3
  parallelism: 2
  activeDeadlineSeconds: 100
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: test-job
    spec:
      containers:
        - name: pi
          image: perl:5.34.0
          command: ["perl","-Mbignum=bpi","-wle","print bpi(2000)"]
      restartPolicy: Never
